<!DOCTYPE html>
<html>
<head>
  <title>Quote Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    h1, h2 {
      color: #38bdf8;
    }
    .box {
      background: #1e293b;
      padding: 15px;
      margin: 12px 0;
      border-radius: 10px;
    }
    button {
      padding: 8px 12px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }
    select, input {
      padding: 8px;
      margin-top: 8px;
      font-size: 16px;
      width: 100%;
    }
    .total {
      font-size: 28px;
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>💰 Quote Calculator</h1>

<!-- BASE PACKAGE -->
<div class="box">
<h2>📦 Base System</h2>
<select id="base" onchange="calc(); beep();">
  <option value="0">None</option>
  <option value="800">Basic ($800+)</option>
  <option value="1500">Standard ($1,500+)</option>
  <option value="3000">Advanced ($3,000+)</option>
</select>
</div>

<!-- HARDWARE -->
<div class="box">
<h2>💻 Hardware</h2>
<input type="number" id="hardware" value="0" oninput="calc(); beep();" placeholder="Enter hardware cost">
</div>

<!-- CAMERA SYSTEM -->
<div class="box">
<h2>🔒 Camera System</h2>
<select id="camsys" onchange="calc(); beep();">
  <option value="0">None</option>
  <option value="500">Reolink NVR System ($500+)</option>
  <option value="1200">Integrated Smart Cameras ($1200+)</option>
</select>
</div>

<!-- CAMERA INSTALL -->
<div class="box">
<h2>🔧 Camera Installation ($150 per camera)</h2>
<button onclick="change('cams', -1)">-</button>
<span id="cams">0</span>
<button onclick="change('cams', 1)">+</button>
</div>

<!-- DEVICES -->
<div class="box">
<h2>🔌 Devices</h2>

<p><b>Smart Plugs ($25 each)</b></p>
<button onclick="change('plug', -1)">-</button>
<span id="plug">0</span>
<button onclick="change('plug', 1)">+</button>

<p><b>Zigbee Switch ($40 each)</b></p>
<button onclick="change('switch', -1)">-</button>
<span id="switch">0</span>
<button onclick="change('switch', 1)">+</button>

<p><b>Motion Sensors ($30 each)</b></p>
<button onclick="change('motion', -1)">-</button>
<span id="motion">0</span>
<button onclick="change('motion', 1)">+</button>

<p><b>Door Sensors ($30 each)</b></p>
<button onclick="change('door', -1)">-</button>
<span id="door">0</span>
<button onclick="change('door', 1)">+</button>

</div>

<!-- AUTOMATIONS -->
<div class="box">
<h2>💡 Automations ($200 each)</h2>
<button onclick="change('auto', -1)">-</button>
<span id="auto">0</span>
<button onclick="change('auto', 1)">+</button>
</div>

<!-- REMOTE -->
<div class="box">
<h2>🌐 Remote Access</h2>
<select id="remote" onchange="calc(); beep();">
  <option value="0">None</option>
  <option value="250">Private VPN Setup ($200–300)</option>
  <option value="125">Cloud Option Setup ($75–150)</option>
</select>
</div>

<!-- TOTAL -->
<div class="box">
<h2>Total Estimate</h2>
<p class="total">$<span id="total">0</span></p>
</div>

<script>
let cams = 0;
let auto = 0;
let plug = 0;
let sw = 0;
let motion = 0;
let door = 0;

// simple click sound
function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(600, ctx.currentTime);

  gain.gain.setValueAtTime(0.05, ctx.currentTime);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.05);
}

function change(type, val) {
  if (type === 'cams') cams = Math.max(0, cams + val);
  if (type === 'auto') auto = Math.max(0, auto + val);
  if (type === 'plug') plug = Math.max(0, plug + val);
  if (type === 'switch') sw = Math.max(0, sw + val);
  if (type === 'motion') motion = Math.max(0, motion + val);
  if (type === 'door') door = Math.max(0, door + val);

  document.getElementById(type).innerText =
    type === 'switch' ? sw :
    type === 'cams' ? cams :
    type === 'auto' ? auto :
    type === 'plug' ? plug :
    type === 'motion' ? motion :
    door;

  calc();
  beep();
}

function calc() {
  let base = parseInt(document.getElementById('base').value);
  let camsys = parseInt(document.getElementById('camsys').value);
  let remote = parseInt(document.getElementById('remote').value);
  let hardware = parseInt(document.getElementById('hardware').value) || 0;

  let total =
    base +
    camsys +
    (cams * 150) +
    (plug * 25) +
    (sw * 40) +
    (motion * 30) +
    (door * 30) +
    (auto * 200) +
    remote +
    hardware;

  document.getElementById('total').innerText = total;
}
</script>

</body>
</html>
